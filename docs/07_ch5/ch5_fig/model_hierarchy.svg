<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>

  <!-- Full model (top, green) -->
  <rect x="200" y="22" width="400" height="76" rx="7"
        fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="47" text-anchor="middle"
        font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#166534">
    Full Model — 7 free means
  </text>
  <text x="400" y="66" text-anchor="middle"
        font-family="Georgia, serif" font-size="11.5" fill="#374151">
    &#956;_A, &#956;_B, &#956;_C, &#956;_D, &#956;_E, &#956;_F, &#956;_Spock  all distinct
  </text>
  <text x="400" y="87" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="10" fill="#6b7280" font-style="italic">
    RSS = 1864 &#183; df&#8347;&#8364;&#737;&#737; = 39
  </text>

  <!-- Arrow: Intermediate -> Full -->
  <line x1="400" y1="185" x2="400" y2="100" stroke="#374151"
        stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Left label for Intermediate -> Full (not significant) -->
  <text x="55" y="143" font-family="Arial, sans-serif" font-size="11" fill="#374151">
    Among others, any differ?
  </text>
  <text x="55" y="158" font-family="Arial, sans-serif" font-size="10" fill="#b45309">
    F(5, 39) = 1.37,  p = 0.26  (NS)
  </text>
  <line x1="270" y1="143" x2="395" y2="143"
        stroke="#9ca3af" stroke-width="0.9" stroke-dasharray="4 2"/>

  <!-- Intermediate model (middle, blue) -->
  <rect x="130" y="185" width="540" height="76" rx="7"
        fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="210" text-anchor="middle"
        font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1e3a8a">
    Intermediate — Spock's free; others pooled
  </text>
  <text x="400" y="229" text-anchor="middle"
        font-family="Georgia, serif" font-size="11.5" fill="#374151">
    &#956;_Spock free;  &#956;_A = &#956;_B = &#956;_C = &#956;_D = &#956;_E = &#956;_F = &#956;_others
  </text>
  <text x="400" y="249" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="10" fill="#6b7280" font-style="italic">
    RSS = 2191 &#183; df = 44
  </text>

  <!-- Arrow: Null -> Intermediate -->
  <line x1="400" y1="352" x2="400" y2="263" stroke="#374151"
        stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Right label for Null -> Intermediate (significant) -->
  <text x="542" y="310" font-family="Arial, sans-serif" font-size="11" fill="#374151">
    Is Spock's judge different?
  </text>
  <text x="542" y="325" font-family="Arial, sans-serif" font-size="10" fill="#166534">
    F(1, 39) = 33.48,  p &lt; 0.001
  </text>
  <line x1="405" y1="310" x2="537" y2="310"
        stroke="#9ca3af" stroke-width="0.9" stroke-dasharray="4 2"/>

  <!-- Null model (bottom, red) -->
  <rect x="220" y="352" width="360" height="62" rx="7"
        fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="400" y="377" text-anchor="middle"
        font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#991b1b">
    Null Model — single common mean
  </text>
  <text x="400" y="402" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="10" fill="#6b7280" font-style="italic">
    RSS = 3792 &#183; df = 45
  </text>
</svg>
