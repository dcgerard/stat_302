<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 0 420 290"
   font-family="Arial, sans-serif"
   version="1.1"
   id="svg1"
   sodipodi:docname="line_review.svg"
   inkscape:version="1.4.4 (dcaf3e7, 2026-05-05)"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <sodipodi:namedview
     id="namedview1"
     pagecolor="#ffffff"
     bordercolor="#000000"
     borderopacity="0.25"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     inkscape:zoom="4.0573299"
     inkscape:cx="100.68198"
     inkscape:cy="217.87728"
     inkscape:window-width="1512"
     inkscape:window-height="921"
     inkscape:window-x="0"
     inkscape:window-y="33"
     inkscape:window-maximized="1"
     inkscape:current-layer="svg1" />
  <defs
     id="defs1">
    <marker
       id="ah"
       markerWidth="8"
       markerHeight="6"
       refX="8"
       refY="3"
       orient="auto">
      <polygon
         points="0 0, 8 3, 0 6"
         fill="#333"
         id="polygon1" />
    </marker>
  </defs>
  <!-- Background -->
  <rect
     width="420"
     height="290"
     fill="#f8f9fa"
     rx="10"
     stroke="#dee2e6"
     stroke-width="1"
     id="rect1" />
  <!-- Title -->
  <text
     x="210"
     y="28"
     font-size="14"
     font-weight="bold"
     text-anchor="middle"
     fill="#212529"
     id="text1">Lines: Y = β₀ + β₁X</text>
  <!-- Y-axis: from (75, 258) up to (75, 42) -->
  <line
     x1="75"
     y1="258"
     x2="75"
     y2="40"
     stroke="#333"
     stroke-width="1.5"
     marker-end="url(#ah)"
     id="line-yaxis" />
  <!-- X-axis: from (75, 258) right to (385, 258) -->
  <line
     x1="75"
     y1="258"
     x2="387"
     y2="258"
     stroke="#333"
     stroke-width="1.5"
     marker-end="url(#ah)"
     id="line-xaxis" />
  <!-- Axis labels -->
  <text
     x="393"
     y="262"
     font-size="14"
     font-style="italic"
     fill="#333"
     id="text-xlabel">X</text>
  <text
     x="75"
     y="36"
     font-size="14"
     font-style="italic"
     text-anchor="middle"
     fill="#333"
     id="text-ylabel">Y</text>
  <!-- Origin label -->
  <text
     x="67"
     y="272"
     font-size="11"
     text-anchor="end"
     fill="#555"
     id="text-origin">0</text>
  <!-- The regression line from (75, 218) to (380, 78) -->
  <!-- SVG slope: (78 - 218) / (380 - 75) = -140 / 305 ≈ -0.4590 per pixel -->
  <line
     x1="75"
     y1="218"
     x2="380"
     y2="78"
     stroke="#0066cc"
     stroke-width="2.5"
     id="line-reg" />
  <!-- β₀ intercept: at SVG (75, 218) -->
  <!-- Dashed guide line from y-axis tick to intercept dot -->
  <line
     x1="68"
     y1="218"
     x2="82"
     y2="218"
     stroke="#cc3300"
     stroke-width="1.8"
     id="tick-b0" />
  <circle
     cx="75"
     cy="218"
     r="4.5"
     fill="#cc3300"
     id="dot-b0" />
  <!-- Bracket on y-axis showing β₀ distance from origin -->
  <line
     x1="58"
     y1="258"
     x2="58"
     y2="219"
     stroke="#cc3300"
     stroke-width="1.2"
     id="bracket-vert" />
  <text
     x="54"
     y="222"
     font-size="14px"
     text-anchor="end"
     fill="#cc3300"
     font-style="italic"
     id="label-b0">β₀</text>
  <line
     x1="54"
     y1="258"
     x2="62"
     y2="258"
     stroke="#cc3300"
     stroke-width="1.2"
     id="bracket-bot" />
  <line
     x1="54"
     y1="219"
     x2="62"
     y2="219"
     stroke="#cc3300"
     stroke-width="1.2"
     id="bracket-top" />
  <!-- Slope triangle -->
  <!-- At x_svg=165: y = 218 + (165-75)*(-0.4590) = 218 - 41.31 ≈ 177 -->
  <!-- At x_svg=285: y = 218 + (285-75)*(-0.4590) = 218 - 96.39 ≈ 122 -->
  <!-- Triangle: (165, 177), (285, 177), (285, 122) -->
  <!-- Horizontal "run" leg -->
  <line
     x1="165"
     y1="177"
     x2="285"
     y2="177"
     stroke="#198754"
     stroke-width="1.8"
     stroke-dasharray="6,3"
     id="run-line" />
  <!-- Vertical "rise" leg -->
  <line
     x1="285"
     y1="122"
     x2="285"
     y2="177"
     stroke="#198754"
     stroke-width="1.8"
     stroke-dasharray="6,3"
     id="rise-line" />
  <!-- Right-angle marker -->
  <polyline
     points="274,177 274,166 285,166"
     fill="none"
     stroke="#198754"
     stroke-width="1.2"
     id="right-angle" />
  <!-- Dots at triangle corners on the line -->
  <circle
     cx="165"
     cy="177"
     r="3.5"
     fill="#198754"
     id="dot-triangle-left" />
  <circle
     cx="285"
     cy="122"
     r="3.5"
     fill="#198754"
     id="dot-triangle-right" />
  <!-- "run" label below horizontal leg -->
  <text
     x="225"
     y="194"
     font-size="12"
     text-anchor="middle"
     fill="#198754"
     id="label-run">run</text>
  <!-- "rise" label right of vertical leg -->
  <text
     x="293"
     y="155"
     font-size="12"
     fill="#198754"
     id="label-rise">rise</text>
  <!-- β₁ = rise/run annotation -->
  <text
     x="118"
     y="150"
     font-size="13"
     fill="#198754"
     font-style="italic"
     id="label-b1">β₁ = rise/run</text>
</svg>
